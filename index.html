<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Türk Dekript</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
</head>
<body>
    <header>
        <div class="banner-container">
            <img src="turkdekript.png.jpg" alt="Logo" class="main-logo">
            <img src="turkdekript2.png.jpg" alt="Banner" class="banner-fill">
        </div>
        <div class="blue-bar">
            <span>Konfigurasyon dosyasını deşifre et</span>
        </div>
    </header>

    <main>
        <div class="tp-container">
            <div class="tp-header">Yönetim - Yedekle ve Geri Yükle</div>
            <div class="tp-content">
                <p>Config dosyasını (.bin) seçin ve şifresini çözerek içeriği görüntüleyin.</p>
                <div class="action-row">
                    <input type="file" id="fileInput" accept=".bin">
                    <button id="decryptBtn" class="tp-btn">Dekript Et</button>
                </div>
                <div id="status" class="status-msg">Dosya bekleniyor...</div>
                <textarea id="resultArea" readonly spellcheck="false" placeholder="XML verisi burada görünecek..."></textarea>
                <div class="action-row right">
                    <button id="downloadBtn" class="tp-btn hidden">İndir (.xml)</button>
                </div>
            </div>
        </div>
    </main>

    <script src="decryptor.js"></script>
</body>
</html>
