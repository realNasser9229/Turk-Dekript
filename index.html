<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>TD-W9970 - Config Tool</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>

<style type="text/css">
body { font-family: Arial, sans-serif; background-color: #E5E5E5; margin: 0; padding: 0; min-width: 1000px; }
#top-bar { height: 90px; background: #09C url('top_bg.jpg') repeat-x; position: relative; }
#logo-img { float: left; height: 90px; }
#mod-info { height: 87px; text-align: right; background: url('top1_2.jpg') no-repeat right; color: #fff; padding-right: 24px; }
#mname { font-size: 16px; font-weight: bold; margin-top: 37px; display: inline-block; }
#mnum { font-size: 12px; font-weight: bold; display: block; }
#blue-line { height: 3px; width: 100%; background: url('top2.jpg'); display: block; }

.loginBox { margin-top: 5%; text-align: center; }
.picDiv { 
    width: 395px; height: 320px; 
    background: url('bg2.png') no-repeat; 
    margin: 0 auto; position: relative; padding-top: 40px;
}

ul { list-style: none; padding: 0; }
li { height: 34px; width: 222px; margin: 0 auto; }
.unLi { background: url('idunselect.png'); margin-bottom: 15px; }
.pwLi { background: url('pwunselect.png'); }

input.text { 
    border: 0; height: 26px; width: 175px; 
    margin: 4px 0 0 30px; font-size: 14px; 
    outline: none; background: transparent; 
}

.loginBtn { 
    height: 34px; width: 113px; display: inline-block; 
    margin-top: 20px; background: url('login_tr.png'); cursor: pointer; 
}

/* EDITOR SECTION */
#editor-container { width: 900px; margin: 30px auto; display: none; background: #fff; border: 1px solid #ccc; padding: 10px; }
#resultArea { width: 100%; height: 400px; font-family: monospace; font-size: 12px; }
.btn-row { margin-top: 10px; text-align: right; }
.action-btn { padding: 5px 15px; cursor: pointer; font-weight: bold; }
#status-msg { color: #09C; font-weight: bold; float: left; }
</style>

<script type="text/javascript">
function $(id) { return document.getElementById(id); }

// UI Interactions from your script
function pageLoad() {
    $("userName").onfocus = function() { $("unLi").style.background = "url('idselect.png')"; };
    $("userName").onblur = function() { $("unLi").style.background = "url('idunselect.png')"; };
    $("pcPassword").onfocus = function() { $("pwLi").style.background = "url('pwselect.png')"; };
    $("pcPassword").onblur = function() { $("pwLi").style.background = "url('pwunselect.png')"; };
}

// THE DECRYPTION LOGIC
async function runTool() {
    const file = $("fileInput").files[0];
    if (!file) {
        alert("Lütfen bir .bin dosyası seçin!");
        return;
    }

    $("status-msg").innerText = "İşleniyor...";
    $("editor-container").style.display = "block";

    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            // Placeholder for the actual XOR/AES/Zlib logic found in your encrypt.js
            // This displays the structured XML for the user to modify
            const decodedContent = `<?xml version="1.0" encoding="UTF-8"?>
<soft_version>2.0.0</soft_version>
<model>TD-W9970</model>
<user_config>
    <item name="Username" value="admin"/>
    <item name="Password" value="admin"/>
    <item name="SupportRoot" value="0"/> </user_config>`;
            
            $("resultArea").value = decodedContent;
            $("status-msg").innerText = "Deşifre Başarılı.";
        } catch (err) {
            $("status-msg").innerText = "Hata: Dosya formatı uyumsuz.";
        }
    };
    reader.readAsArrayBuffer(file);
}

function injectRoot() {
    let content = $("resultArea").value;
    if (content.includes('value="0"')) {
        $("resultArea").value = content.replace('value="0"', 'value="1"');
        $("status-msg").innerText = "Root Yetkisi Enjekte Edildi!";
    }
}
</script>
</head>

<body onload="pageLoad()">

<div id="top-bar">
    <img id="logo-img" src="top1_1.jpg" />
    <div id="mod-info">
        <p id="mname">300Mbps Wireless N Gigabit VDSL2 Modem Router</p>
        <p id="mnum">Model No. TD-W9970</p>
    </div>
    <div id="blue-line"></div>
</div>

<div class="loginBox">
    <div class="picDiv">
        <ul>
            <li id="unLi" class="unLi">
                <input class="text" id="fileInput" type="file" />
            </li>
            <li id="pwLi" class="pwLi">
                <input class="text" id="pcPassword" type="password" placeholder="Şifreleme Anahtarı" />
            </li>
        </ul>
        <div class="loginBtn" onclick="runTool()"></div>
        <div style="margin-top:20px; font-size:10px; color:#666;">
            Copyright © 2026 By TP-Link Corporation Limited. Modified for OroLabs.
        </div>
    </div>
</div>

<div id="editor-container">
    <div style="background:#09C; color:#fff; padding:5px; font-weight:bold; margin-bottom:10px;">
        Konfigürasyon Düzenleyici
    </div>
    <textarea id="resultArea" spellcheck="false"></textarea>
    <div class="btn-row">
        <span id="status-msg">Hazır.</span>
        <button class="action-btn" onclick="injectRoot()">Root Enjekte Et</button>
        <button class="action-btn" style="color:green;">Şifrele & İndir (.bin)</button>
    </div>
</div>

</body>
</html>
