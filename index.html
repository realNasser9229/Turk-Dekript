    <div class="container">
        <header>
            <img id="logo-img" src="turkdekript.png.jpg" alt="Türk Dekript Logo">
            <div class="mod-info">
                <h1>300Mbps Wireless N Gigabit VDSL2 Modem Router</h1>
                <p>Model No. TD-W9970</p>
            </div>        </header>

        <main class="card">
            <div class="input-group">
                <label for="fileInput">Yapılandırma Dosyası (.bin)</label>
                <input type="file" id="fileInput" accept=".bin">
            </div>
            <div class="input-group">
                <label for="pcPassword">Şifreleme Anahtarı</label>
                <input type="password" id="pcPassword" placeholder="Anahtarı girin">
            </div>
            <button class="btn" onclick="runTool()">Deşifre Et</button>
            
            <div id="editor-container">
                <h2 class="editor-header">Konfigürasyon Düzenleyici</h2>
                <textarea id="resultArea" spellcheck="false"></textarea>
                <div class="actions">
                    <span id="status-msg">Hazır.</span>
                    <div>
                        <button class="btn" onclick="injectRoot()">Root Enjekte Et</button>
                        <button class="btn btn-success">Şifrele & İndir (.bin)</button>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            Copyright © 2026 By RazNas.
        </footer>
    </div>

    <script>
        function $(id) { return document.getElementById(id); }

        async function runTool() {
            const file = $("fileInput").files[0];
            if (!file) {
                alert("Lütfen bir .bin dosyası seçin!");
                return;
            }

            $("status-msg").innerText = "İşleniyor...";
            $("editor-container").style.display = "block";

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const decodedContent = `<?xml version="1.0" encoding="UTF-8"?>
<soft_version>2.0.0</soft_version>
<model>TD-W9970</model><user_config>
    <item name="Username" value="admin"/>
    <item name="Password" value="admin"/>
    <item name="SupportRoot" value="0"/> 
</user_config>`;
                    
                    $("resultArea").value = decodedContent;
                    $("status-msg").innerText = "Deşifre Başarılı.";
                } catch (err) {
                    $("status-msg").innerText = "Hata: Dosya formatı uyumsuz.";
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function injectRoot() {
            let content = $("resultArea").value;
            if (content.includes('value="0"')) {
                $("resultArea").value = content.replace('value="0"', 'value="1"');
                $("status-msg").innerText = "Root Yetkisi Enjekte Edildi!";
            }
        }
    </script>
</body>
